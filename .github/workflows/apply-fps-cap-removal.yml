name: Apply FPS cap removal

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/remove-tier1-fps-cap
          fetch-depth: 0

      - name: Apply changes
        run: |
          python - <<'PY'
          from pathlib import Path

          main = Path("bambucam/main.py")
          text = main.read_text()
          replacements = {
              '2: "mid (Pi Zero 2 W / Pi 3) — RTSP + MJPEG≤30fps",':
                  '2: "mid (Pi Zero 2 W / Pi 3) — RTSP + MJPEG",',
              '    mjpeg_fps_cap = {1: 15, 2: 30}.get(tier)':
                  '    # Tiers select expensive streaming defaults only; user-selected FPS is never capped.\n'
                  '    hardware_fps_cap = None',
              '            mjpeg_fps_cap,\n            detected.detected_resolutions,':
                  '            hardware_fps_cap,\n            detected.detected_resolutions,',
              'mjpeg_fps = _effective_mjpeg_fps(selected_fps, mjpeg_config, mjpeg_fps_cap)':
                  'mjpeg_fps = _effective_mjpeg_fps(selected_fps, mjpeg_config, hardware_fps_cap)',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f"Missing main.py text: {old!r}")
              text = text.replace(old, new, 1)
          main.write_text(text)

          app_js = Path("bambucam/web/static/js/app.js")
          text = app_js.read_text()
          anchor = "    const result = await api('POST', '/camera/settings', { resolution, framerate });\n"
          sync = "    await api('POST', '/config', { streaming: { mjpeg: { fps: framerate } } });\n"
          if anchor not in text:
              raise SystemExit("Missing stream settings anchor in app.js")
          if sync not in text:
              text = text.replace(anchor, anchor + sync, 1)
          app_js.write_text(text)

          system_info = Path("bambucam/system_info.py")
          text = system_info.read_text()
          text = text.replace(
              "      2 — Pi Zero 2 W, Pi 3           → RTSP + MJPEG capped at 30 fps\n",
              "      2 — Pi Zero 2 W, Pi 3           → RTSP + MJPEG\n",
          ).replace(
              "      3 — Pi 4, Pi 5, non-Pi          → full stack, no caps\n",
              "      3 — Pi 4, Pi 5, non-Pi          → full stack\n"
              "\n    Tiers select streaming defaults only and never cap a configured frame rate.\n",
          )
          system_info.write_text(text)

          config = Path("config/bambucam.yaml")
          text = config.read_text().replace(
              "framerate: auto            # auto or 1-120, capped to camera and hardware limits",
              "framerate: auto            # auto or 1-120, capped only to camera limits",
          )
          config.write_text(text)

          pyproject = Path("pyproject.toml")
          text = pyproject.read_text()
          if 'version = "1.0.6"' not in text:
              raise SystemExit("Unexpected project version")
          pyproject.write_text(text.replace('version = "1.0.6"', 'version = "1.0.16"', 1))

          tests = Path("tests/test_main.py")
          text = tests.read_text()
          anchor = "    def test_applies_hardware_tier_cap(self):\n        assert _effective_mjpeg_fps(60, {\"fps\": 45}, tier_fps_cap=30) == 30\n"
          addition = "\n    def test_without_hardware_cap_preserves_selected_fps(self):\n        assert _effective_mjpeg_fps(30, {\"fps\": 30}, tier_fps_cap=None) == 30\n"
          if anchor not in text:
              raise SystemExit("Missing test insertion anchor")
          if "test_without_hardware_cap_preserves_selected_fps" not in text:
              text = text.replace(anchor, anchor + addition, 1)
          tests.write_text(text)
          PY

          rm .github/workflows/apply-fps-cap-removal.yml

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: remove automatic hardware FPS caps"
          git push origin HEAD:fix/remove-tier1-fps-cap
