name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: write

jobs:
  shellcheck-fix:
    name: One-time ShellCheck fix
    if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply exact ShellCheck fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/install.sh")
          text = path.read_text(encoding="utf-8")
          old_script_dir = 'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]:-install.sh}")" 2>/dev/null && pwd || true)"'
          new_script_dir = 'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]:-install.sh}")" 2>/dev/null && pwd)"'
          old_group = '  getent group "$group" >/dev/null 2>&1 && usermod -aG "$group" "$SERVICE_USER" || true'
          new_group = (
              '  if getent group "$group" >/dev/null 2>&1; then\n'
              '    usermod -aG "$group" "$SERVICE_USER" || true\n'
              '  fi'
          )
          if old_script_dir not in text:
              raise SystemExit("SCRIPT_DIR pattern not found")
          if old_group not in text:
              raise SystemExit("group pattern not found")
          text = text.replace(old_script_dir, new_script_dir, 1)
          text = text.replace(old_group, new_group, 1)
          path.write_text(text, encoding="utf-8")
          Path("shellcheck-report.txt").unlink(missing_ok=True)
          PY
          shellcheck scripts/install.sh
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/install.sh shellcheck-report.txt
          git commit -m "fix: satisfy ShellCheck installer diagnostics"
          git push origin HEAD:${{ github.head_ref }}
