name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: write

jobs:
  shellcheck-diagnostic:
    name: One-time ShellCheck diagnostic
    if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Capture ShellCheck output
        run: |
          shellcheck --format=gcc scripts/install.sh > shellcheck-report.txt 2>&1 || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add shellcheck-report.txt
          git commit -m "chore: capture ShellCheck diagnostic"
          git push origin HEAD:${{ github.head_ref }}
