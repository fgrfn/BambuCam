name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: write

jobs:
  diagnose-transform:
    name: One-time observability transform diagnostic
    if: github.actor != 'github-actions[bot]' && (github.ref_name == 'agent/observability-ui-cleanup' || github.head_ref == 'agent/observability-ui-cleanup')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/observability-ui-cleanup
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Capture exact transformation failure
        shell: bash
        run: |
          set +e
          {
            echo '=== transform ==='
            python scripts/apply_observability_cleanup.py
            echo '=== install ==='
            python -m pip install -e ".[dev]"
            echo '=== black ==='
            black bambucam/ tests/
            echo '=== ruff ==='
            ruff check bambucam/ tests/
            echo '=== tests ==='
            pytest tests/ -q --cov=bambucam --cov-fail-under=35
            echo '=== static checks ==='
            test -s bambucam/web/static/css/app.css
            test -s bambucam/web/static/js/app.js
            ! grep -q '<style>' bambucam/web/templates/index.html
          } > transform-report.txt 2>&1
          status=$?
          cp transform-report.txt /tmp/transform-report.txt
          git reset --hard HEAD
          git clean -fd
          cp /tmp/transform-report.txt transform-report.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add transform-report.txt
          git commit -m "chore: capture observability transform diagnostic"
          git push origin HEAD:agent/observability-ui-cleanup
          exit "$status"
