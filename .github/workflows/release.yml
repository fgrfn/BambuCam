name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install and test
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pytest tests/ -v --tb=short

  quality:
    name: Lint, format, shell, and package checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install tools
        run: pip install -e ".[dev]" build twine
      - name: Ruff
        run: ruff check bambucam/ tests/
      - name: Black
        run: black --check bambucam/ tests/
      - name: ShellCheck
        run: shellcheck scripts/install.sh
      - name: Compile Python sources
        run: python -m compileall -q bambucam tests
      - name: Build package smoke test
        run: |
          python -m build
          twine check dist/*

  build:
    name: Build signed-by-checksum release assets
    needs: [test, quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Set version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          sed -i "s/^__version__ = .*/__version__ = \"${VERSION}\"/" bambucam/_version.py

      - name: Build wheel and source distribution
        run: |
          python -m build
          twine check dist/*

      - name: Build complete installer bundle
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cp scripts/install.sh dist/install.sh
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.pytest_cache' \
            --exclude='__pycache__' \
            --exclude='dist' \
            --transform "s,^,bambucam-${VERSION}/," \
            -czf "dist/bambucam-${VERSION}-bundle.tar.gz" .
          (
            cd dist
            sha256sum \
              "bambucam-${VERSION}-py3-none-any.whl" \
              "bambucam-${VERSION}.tar.gz" \
              "bambucam-${VERSION}-bundle.tar.gz" \
              install.sh \
              > SHA256SUMS
          )

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: dist/
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist/

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [[ -n "$PREVIOUS_TAG" ]]; then
            COMMITS=$(git log "${PREVIOUS_TAG}..${GITHUB_REF_NAME}" --pretty=format:'- %s' --no-merges)
          else
            COMMITS=$(git log --pretty=format:'- %s' --no-merges | head -20)
          fi
          {
            echo 'commits<<EOF'
            echo "$COMMITS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: BambuCam v${{ steps.version.outputs.version }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## BambuCam v${{ steps.version.outputs.version }}

            ### Changes
            ${{ steps.changelog.outputs.commits }}

            ### Installation
            ```bash
            curl -fsSL https://github.com/fgrfn/bambucam/releases/download/${{ github.ref_name }}/install.sh | sudo bash
            ```

            Existing installations can update through the protected BambuCam WebUI.

            `SHA256SUMS` contains checksums for the wheel, source distribution,
            complete installer bundle, and installer script.
          files: dist/*
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}
