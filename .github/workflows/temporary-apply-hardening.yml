name: Temporary apply hardening patch

on:
  push:
    branches:
      - agent/harden-web-and-streaming

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/harden-web-and-streaming
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply targeted patch
        run: python scripts/apply_hardening_patch.py

      - name: Format and validate
        run: |
          python -m pip install -e '.[dev]'
          black bambucam/ tests/
          ruff check bambucam/ tests/
          pytest tests/ -q

      - name: Commit generated changes
        run: |
          if git diff --quiet; then
            echo 'No generated changes.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add bambucam config
          git commit -m 'feat: apply web and streaming hardening'
          git push origin HEAD:agent/harden-web-and-streaming
