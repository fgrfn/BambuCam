name: Temporary apply installer release patch

on:
  push:
    branches:
      - agent/harden-installer-updater-release

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/harden-installer-updater-release
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply targeted patch
        run: python scripts/apply_installer_release_patch.py

      - name: Format and validate
        run: |
          python -m pip install -e '.[dev]' build twine
          black bambucam/ tests/
          ruff check bambucam/ tests/
          shellcheck scripts/install.sh
          pytest tests/ -q --cov=bambucam --cov-fail-under=35
          python -m build
          twine check dist/*

      - name: Commit generated changes
        run: |
          if git diff --quiet; then
            echo 'No generated changes.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add bambucam tests scripts systemd
          git commit -m 'chore: finalize installer and updater hardening'
          git push origin HEAD:agent/harden-installer-updater-release
