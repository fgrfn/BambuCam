name: Temporary format camera startup branch

on:
  push:
    branches:
      - agent/fix-camera-startup-selection

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-camera-startup-selection
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Format Python files
        run: |
          python -m pip install black
          black bambucam/ tests/

      - name: Commit formatting
        run: |
          if git diff --quiet; then
            echo 'No formatting changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add bambucam tests
          git commit -m 'style: format camera startup changes'
          git push origin HEAD:agent/fix-camera-startup-selection
