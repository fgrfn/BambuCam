# BambuCam Configuration
# Full reference: https://github.com/fgrfn/bambucam/blob/main/docs/configuration.md

camera:
  index: 0                   # Camera index after backend filtering (0 = first detected)
  backend: auto              # auto | picamera2 | v4l2
  module: auto               # auto | v1 | v1_noir | v2 | v2_noir | v3 | v3_noir | v3_wide | v3_wide_noir | hq | ai | gs
                             # Use v3_noir / v3_wide_noir if auto-detection shows the wrong model
  resolution: auto           # auto or WidthxHeight, e.g. 1920x1080
  framerate: auto            # auto or 1-120, capped only to camera limits

  # Image adjustments (-1.0 … 1.0 for brightness, 0 … 32 for others)
  brightness: 0.0
  contrast: 1.0
  saturation: 1.0
  sharpness: 1.0

  # Exposure & white balance
  exposure_mode: auto        # auto | sport | night
  awb_mode: auto             # auto | sunlight | cloudy | shade | tungsten | fluorescent | indoor

  # Orientation
  vflip: false
  hflip: false

  # Camera Module 3 specific (ignored for other models)
  autofocus: true
  hdr: false

streaming:
  mjpeg:
    enabled: true
    port: 8080               # Same port as WebUI (/stream path)
    quality: 85              # JPEG quality (1-100)
    fps: 15                  # MJPEG target FPS, capped by camera FPS

  rtsp:
    enabled: true
    port: 8554               # RTSP port (rtsp://<ip>:8554/cam)
    stream_name: cam         # Stream path name
    bitrate_kbps: 2000       # H.264 target bitrate

    # HLS (HTTP Live Streaming) — playable in browsers, OBS
    enable_hls: true
    hls_port: 8888           # http://<ip>:8888/cam/index.m3u8

    # WebRTC — lowest latency, experimental
    enable_webrtc: false
    webrtc_port: 8889

    auth:
      enabled: false
      username: ""
      password: ""

  snapshot:
    enabled: true
    save_dir: /var/lib/bambucam/snapshots
    max_count: 500            # 0 disables the count limit
    max_age_days: 30          # 0 disables the age limit
    max_bytes: 1073741824     # 1 GiB; 0 disables the byte limit

web:
  host: 0.0.0.0              # Listen on all interfaces
  port: 8080
  secret_key: ""             # Auto-generated if empty

  # Optional WebUI password protection
  auth:
    enabled: false
    username: admin
    password: ""             # Stored as a secure hash after startup
    api_token: ""            # Optional Bearer token for integrations

  trust_proxy: false          # Enable only behind a trusted reverse proxy

  https:
    enabled: false
    cert: ""                 # Path to SSL certificate
    key: ""                  # Path to SSL private key

system:
  log_level: INFO            # DEBUG | INFO | WARNING | ERROR
  mediamtx_path: /usr/local/bin/mediamtx
  ffmpeg_path: ffmpeg
  diagnostics_log_lines: 300  # Recent in-memory log lines in support bundles
